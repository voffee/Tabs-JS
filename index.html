<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Tabs</title>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div role="tablist" aria-label="Programming Languages">
                <button role="tab" class="raleway-large" aria-selected="true" id="js">JavaScript</button>
                <button role="tab" class="raleway-large" aria-selected="false" id="php">PHP</button>
                <button role="tab" class="raleway-large" aria-selected="false" id="ruby">Ruby</button>
            </div>
            <div role="tabpanel" aria-labelledby="js">
                <p class="raleway-small">JavaScript is great!</p>
            </div>
            <div role="tabpanel" aria-labelledby="php">
                <p class="raleway-small">PHP is great!</p>
            </div>
            <div role="tabpanel" aria-labelledby="ruby">
                <p class="raleway-small">Ruby is great!</p>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
